version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: videotool-postgres
    ports:
      - "25432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: videotool
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: videotool-redis
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio
    container_name: videotool-minio
    ports:
      - "29000:9000"
      - "29001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videotool-backend
    ports:
      - "23001:23001"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/videotool?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_ENDPOINT: "localhost"
      MINIO_PUBLIC_PORT: 29000
      MINIO_PUBLIC_USE_SSL: "false"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET_NAME: "videos"
      PORT: 23001
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./engine:/app/engine
      - ./storage:/app/storage
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videotool-frontend
    ports:
      - "23000:23000"
    depends_on:
      - backend
    environment:
      API_UPSTREAM: "http://backend:23001"
      MEDIA_PROXY_ALLOWED_HOSTS: "minio,localhost,127.0.0.1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:
